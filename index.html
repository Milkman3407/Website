<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empire Access 3D Print Request Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <header class="container hero">
      <a class="cart-icon-link" href="checkout.html" aria-label="Go to checkout">
        <span class="cart-icon" aria-hidden="true">🛒</span>
        <span id="cart-count-badge" class="cart-count-badge">0</span>
      </a>
      <div class="brand-lockup" aria-label="Empire Access">
        <svg viewBox="0 0 560 130" role="img" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
          <title>Empire Fiber Internet</title>
          <path
            d="M20 72c26 19 63 22 93 11"
            fill="none"
            stroke="#5ec13c"
            stroke-width="7"
            stroke-linecap="round"
          />
          <path
            d="M27 82c24 15 58 17 85 9"
            fill="none"
            stroke="#00a0df"
            stroke-width="4.5"
            stroke-linecap="round"
          />
          <text x="38" y="82" fill="#e31f4f" font-size="95" font-weight="800" letter-spacing="1">
            empire
          </text>
          <text x="275" y="108" fill="#63b942" font-size="32" font-weight="700">FIBER INTERNET</text>
        </svg>
      </div>
      <h1>3D Print Request Portal</h1>
      <p class="hero-subtitle">
        Browse field-ready components, add what you need, and submit one clean request in minutes.
      </p>

      <a class="cta-button" href="#products">Browse Prints</a>
    </header>

    <main class="container">
      <section class="content-section">
        <div class="section-header">
          <h2>Available Prints</h2>
          <p>Choose from standardized print kits built for installation teams.</p>
        </div>
        <div id="products" class="cards" aria-live="polite"></div>
      </section>
    </main>

    <footer class="container">
      <small>© Empire Access – 3D Print Requests</small>
    </footer>

    <script src="products.js"></script>
    <script src="script.js"></script>
  </body>
</html>
